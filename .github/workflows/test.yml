name: Test dotfiles

on:
  push:
    branches: [main, beta]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------------
  # Lint — syntax check all shell scripts
  # -------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: brew install bash zsh
      - name: bash -n bootstrap scripts
        run: |
          fail=0
          while IFS= read -r -d '' f; do
            bash -n "$f" && echo "  ok: $f" || { echo "  FAIL: $f"; fail=1; }
          done < <(find .config/yadm -type f \( -name "bootstrap*" -o -path "*/bootstrap.d/*" \) -print0)
          [ "$fail" -eq 0 ] || exit 1
      - name: zsh -n all .zsh files
        run: |
          fail=0
          while IFS= read -r -d '' f; do
            zsh -n "$f" && echo "  ok: $f" || { echo "  FAIL: $f"; fail=1; }
          done < <(find . -not -path './.git/*' -name "*.zsh" -print0)
          [ "$fail" -eq 0 ] || exit 1

  # -------------------------------------------------------------------------
  # Validate configs
  # -------------------------------------------------------------------------
  validate:
    name: Validate configs
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Brewfile syntax
        run: |
          if grep -q "^brew " .Brewfile 2>/dev/null; then
            echo "  ok: Brewfile has brew entries"
          else
            echo "  WARN: Brewfile may be empty or use cask"
          fi
      - name: Validate SSH config
        run: |
          if grep -q "^Host " .ssh/config 2>/dev/null; then
            echo "  ok: SSH config has hosts"
          else
            echo "  FAIL: SSH config invalid"
            exit 1
          fi
      - name: Validate kitty config exists
        run: |
          if [ -f .config/kitty/kitty.conf ]; then
            echo "  ok: kitty config exists"
          else
            echo "  FAIL: kitty config missing"
            exit 1
          fi

  # -------------------------------------------------------------------------
  # Brewfile test
  # -------------------------------------------------------------------------
  brew-bundle:
    name: Test Brewfile
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Brewfile
        run: |
          cp .Brewfile "$HOME/.Brewfile"
      - name: Check packages exist in brew
        run: |
          # Test brews
          while IFS= read -r line; do
            [[ -z "$line" || "$line" == \#* ]] && continue
            pkg=$(echo "$line" | awk '{print $2}')
            if brew info "$pkg" &>/dev/null; then
              echo "  ok: brew $pkg"
            else
              echo "  WARN: brew $pkg not found"
            fi
          done < <(grep "^brew " .Brewfile)
          # Test casks
          while IFS= read -r line; do
            [[ -z "$line" || "$line" == \#* ]] && continue
            pkg=$(echo "$line" | awk '{print $2}')
            if brew info --cask "$pkg" &>/dev/null; then
              echo "  ok: cask $pkg"
            else
              echo "  WARN: cask $pkg not found"
            fi
          done < <(grep "^cask " .Brewfile)
          # Test taps
          while IFS= read -r line; do
            [[ -z "$line" || "$line" == \#* ]] && continue
            pkg=$(echo "$line" | awk '{print $2}')
            if brew tap | grep -q "$pkg"; then
              echo "  ok: tap $pkg"
            else
              echo "  WARN: tap $pkg not found"
            fi
          done < <(grep "^tap " .Brewfile)
      - name: Run brew bundle (dry-run)
        run: |
          brew bundle check --force 2>/dev/null && echo "  ok: brew bundle satisfied" || echo "  info: brew bundle needs install"

  # -------------------------------------------------------------------------
  # Bootstrap test
  # -------------------------------------------------------------------------
  bootstrap:
    name: Bootstrap (dry-run)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yadm
        run: brew install yadm
      - name: Setup git
        run: |
          git config --global user.email "test@test.com"
          git config --global user.name "Test"
      - name: Test bootstrap detects OS
        run: |
          chmod +x .config/yadm/bootstrap
          ./.config/yadm/bootstrap --dry-run 2>/dev/null || echo "  info: bootstrap dry-run completed"

  # -------------------------------------------------------------------------
  # macOS Test
  # -------------------------------------------------------------------------
  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: brew install fzf starship neovim || true
      - name: Deploy dotfiles
        run: |
          chmod +x ci/deploy-dotfiles.sh
          ci/deploy-dotfiles.sh macos
      - name: Generate fzf integration
        run: |
          if fzf --zsh >/dev/null 2>&1; then fzf --zsh > "$HOME/.fzf.zsh"
          else touch "$HOME/.fzf.zsh"; fi
      - name: Test starship
        run: |
          starship help >/dev/null 2>&1 && echo "  ok: starship works" || { echo "  FAIL: starship"; exit 1; }
      - name: Run tests
        run: zsh ci/test-zshrc.zsh
